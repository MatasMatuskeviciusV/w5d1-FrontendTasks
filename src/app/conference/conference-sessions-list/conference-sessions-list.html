<ul>
  @for (s of (sessions() | sortSessionsByStart); track s.id) {
    <li [appHighlightOnHover]="'#e7f5ff'">
      <div><strong>{{ s.title }}</strong></div>
      <div>Track: {{ s.track?.name ?? '—' }}</div>
      <div>{{ s.startTime }} - {{ s.endTime }}</div>

      <button type="button" (click)="deleteSession(s.id)">Delete</button>
    </li>
  }
</ul>
