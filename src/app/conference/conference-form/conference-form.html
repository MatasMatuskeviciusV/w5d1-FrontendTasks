<div class="wrapper">
  <div class="flip-card__inner">
    <div class="flip-card__front">
      <div class="title">{{ isEditMode() ? 'Edit session' : 'Create session' }}</div>

      @if (errorMessage) {
        <div class="error">
          <strong>Error:</strong> {{ errorMessage }}
        </div>
      }

      @if (successMessage) {
        <div class="success">
          {{ successMessage }}
        </div>
      }

      <form class="flip-card__form" [formGroup]="form" (ngSubmit)="submit()">
        <input
          class="flip-card__input"
          type="text"
          formControlName="title"
          placeholder="Session title"
        />

        <textarea
          class="flip-card__input"
          formControlName="abstract"
          placeholder="Session description"
          rows="4"
        ></textarea>

        <input
          class="flip-card__input"
          type="datetime-local"
          formControlName="startTime"
        />

        <input
          class="flip-card__input"
          type="datetime-local"
          formControlName="endTime"
        />

        <select class="flip-card__input" formControlName="trackId">
          <option value="" disabled>Select a track</option>
          @for (t of tracks(); track t.id) {
            <option [ngValue]="t.id">{{ t.name }}</option>
          }
        </select>

        <button class="flip-card__btn" type="submit" [disabled]="form.invalid || isSubmitting">
          @if (isSubmitting) {
            Saving...
          } @else {
            {{ isEditMode() ? 'Save session' : 'Create session' }}
          }
        </button>
      </form>
    </div>
  </div>
</div>
